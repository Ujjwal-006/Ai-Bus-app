{% extends 'base.html' %}
{% block title %}Reset Password | TRAJET{% endblock %}
{% block content %}
<main class="relative min-h-screen flex items-center justify-center pt-24 px-4 overflow-hidden">
    <div class="glass-card w-full max-w-[480px] p-8 md:p-12 rounded-lg shadow-2xl relative z-10">
        <div class="text-center mb-10">
            <h1 class="font-headline-lg text-headline-lg text-primary mb-2">Reset Password</h1>
            <p class="text-on-surface-variant font-body-md">Enter your new password.</p>
        </div>
        <form class="space-y-6" method="POST">
            {% csrf_token %}
            <div class="space-y-2">
                <label class="font-label-caps text-label-caps text-on-surface-variant block">New Password</label>
                <input class="w-full bg-secondary-fixed/20 border border-outline-variant/30 rounded px-4 py-3" type="password" required/>
            </div>
            <div class="space-y-2">
                <label class="font-label-caps text-label-caps text-on-surface-variant block">Confirm Password</label>
                <input class="w-full bg-secondary-fixed/20 border border-outline-variant/30 rounded px-4 py-3" type="password" required/>
            </div>
            <button class="w-full bg-primary text-on-primary py-4 font-label-caps text-label-caps rounded font-bold hover:bg-primary-container transition-all uppercase tracking-widest" type="submit">Reset Password</button>
        </form>
    </div>
</main>
{% endblock %}
