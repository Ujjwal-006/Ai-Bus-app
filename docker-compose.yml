version: '3.8'

services:
  db:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: trajet_db
      POSTGRES_USER: trajet_user
      POSTGRES_PASSWORD: trajet_pass_2024
    ports:
      - "5432:5432"

  web:
    build: .
    command: gunicorn trajet_project.wsgi:application --bind 0.0.0.0:8000 --workers 4
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    expose:
      - 8000
    environment:
      - DEBUG=0
      - SECRET_KEY=change-this-to-a-secure-key-in-production
      - DATABASE_URL=postgres://trajet_user:trajet_pass_2024@db:5432/trajet_db
    depends_on:
      - db

  nginx:
    image: nginx:1.25-alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/static:ro
      - media_volume:/media:ro
    ports:
      - "80:80"
    depends_on:
      - web

volumes:
  postgres_data:
  static_volume:
  media_volume:
